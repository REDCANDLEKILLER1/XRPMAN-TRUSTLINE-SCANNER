<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPMAN'S TRUST LINE SCRAPER</title>
    <script src="https://unpkg.com/xrpl@2.3.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #000000; 
            color: #00ff00; 
            font-family: 'Courier New', Courier, monospace; 
            cursor: crosshair;
            margin: 0;
            overflow-x: hidden;
        }
        
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .hud-border { 
            border: 3px solid #00ff00; 
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
            position: relative;
        }
        
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 0, 0.2);
            position: absolute; animation: scan 8s linear infinite;
            pointer-events: none; z-index: 10;
        }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }
        
        .lime-fire {
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 6px;
            background: #32cd32;
            box-shadow: 0 -10px 35px 12px rgba(50, 205, 50, 0.7);
            animation: fireFlicker 1.5s infinite alternate;
            z-index: 5;
        }
        @keyframes fireFlicker {
            0% { opacity: 0.7; transform: scaleY(1); }
            100% { opacity: 1; transform: scaleY(1.3); }
        }

        input, select { 
            background-color: #050505 !important; 
            color: #00ff00 !important; 
            border: 2px solid #00ff00 !important; 
            font-weight: 900 !important;
            border-radius: 0 !important;
        }
        
        .text-glow { text-shadow: 0 0 12px rgba(0, 255, 0, 0.8); }
        .xmeme-brand { letter-spacing: 0.3em; text-shadow: 0 0 10px #32cd32; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen relative">
    <div class="w-full max-w-6xl relative overflow-hidden hud-border bg-black p-6 md:p-10 z-10">
        <div class="scanline"></div>
        <div class="lime-fire"></div>
        
        <header class="border-b-4 border-[#00ff00] pb-6 mb-8 flex flex-col md:flex-row justify-between items-center gap-6 relative z-20">
            <div class="flex items-center gap-6 w-full md:w-auto">
                <div id="tokenIconContainer" class="relative shrink-0">
                    <div id="iconBox" class="w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-black relative z-10 flex items-center justify-center overflow-hidden border-4 border-[#00ff00] shadow-[0_0_15px_#00ff00]">
                        <img id="tokenIcon" src="" class="w-full h-full object-cover hidden" onerror="this.style.display='none'; document.getElementById('iconPlaceholder').style.display='block';">
                        <div id="iconPlaceholder" class="text-4xl font-black text-[#00ff00]">?</div>
                    </div>
                </div>
                <div class="min-w-0">
                    <h1 class="text-3xl md:text-5xl font-black tracking-tighter text-[#00ff00] uppercase text-glow leading-none">XRPMAN'S TRUST LINE SCRAPER_</h1>
                    <div class="mt-2">
                        <p class="text-[14px] font-black text-[#32cd32] uppercase xmeme-brand italic">POWERED BY XMEME</p>
                    </div>
                </div>
            </div>
            
            <div class="flex flex-col items-center md:items-end gap-3 w-full md:w-auto">
                <div class="border-2 border-[#32cd32] px-5 py-2 bg-[#32cd32]/10 text-center min-w-[180px] w-full md:w-auto">
                    <div id="xrpPriceDisplay" class="text-lg font-black text-glow text-[#00ff00]">XRP: SYNC...</div>
                </div>
                <button onclick="location.reload()" class="w-full md:w-auto text-[10px] border-2 border-red-600 text-red-600 px-4 py-1 hover:bg-red-600 hover:text-black transition-all uppercase font-black tracking-widest">REBOOT_CORE</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 mb-8 relative z-20">
            <div class="md:col-span-8 space-y-6">
                <div class="bg-zinc-900/30 border-2 border-[#00ff00] p-6">
                    <label class="block text-xs uppercase font-black text-[#32cd32] tracking-widest mb-4">TARGET_ISSUER_PROTOCOL</label>
                    <div class="flex flex-col sm:flex-row gap-4">
                        <input id="issuer" type="text" placeholder="R-ADDRESS..." class="flex-1 p-4 text-base outline-none font-black tracking-widest">
                        <button id="loadIssuerBtn" onclick="loadIssuerCurrencies()" class="sm:w-auto shrink-0 bg-[#00ff00] text-black px-10 py-4 font-black hover:bg-[#32cd32] transition-all text-sm uppercase tracking-widest">CONNECT</button>
                    </div>
                </div>

                <div id="filterBlock" class="hidden border-2 border-[#00ff00] p-6 bg-black space-y-8">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-black text-[#32cd32] uppercase tracking-widest mb-2">DESIGNATION</label>
                            <select id="currencySelect" class="w-full p-4 outline-none font-black text-sm tracking-widest cursor-pointer"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-[#32cd32] uppercase tracking-widest mb-2">DEX_VALUATION</label>
                            <div id="tokenPriceDisplay" class="p-4 border-2 border-[#00ff00]/40 text-base font-black text-[#00ff00] text-center">---</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 pt-4 border-t border-[#00ff00]/20">
                        <div class="relative">
                            <span class="text-[10px] font-black uppercase text-[#00ff00] absolute -top-5 left-0">MIN_BAL</span>
                            <input id="minBalance" type="number" placeholder="0" class="w-full p-3 text-sm outline-none text-center font-black">
                        </div>
                        <div class="relative">
                            <span class="text-[10px] font-black uppercase text-[#00ff00] absolute -top-5 left-0">MIN_SUPPLY_%</span>
                            <input id="minPercent" type="number" step="0.01" placeholder="0.00" class="w-full p-3 text-sm outline-none text-center font-black">
                        </div>
                        <div class="relative">
                            <span class="text-[10px] font-black uppercase text-[#00ff00] absolute -top-5 left-0">MIN_XRP</span>
                            <input id="minXRP" type="number" placeholder="0" class="w-full p-3 text-sm outline-none text-center font-black">
                        </div>
                    </div>
                </div>

                <button id="startBtn" onclick="startExtraction()" disabled class="w-full bg-[#00ff00] text-black font-black py-6 text-xl transition-all uppercase tracking-[0.4em] disabled:opacity-10 hover:shadow-[0_0_30px_#00ff00]">
                    INITIATE_SCAN
                </button>
            </div>

            <div class="md:col-span-4 border-4 border-[#00ff00] p-6 flex flex-col justify-center items-center text-center bg-zinc-950 shadow-[inset_0_0_40px_rgba(0,255,0,0.2)]">
                <div class="text-xs font-black text-[#32cd32] uppercase tracking-widest mb-4">TARGETS_ACQUIRED</div>
                <div id="progressCount" class="text-8xl font-black text-[#00ff00] text-glow font-mono">0</div>
                <div id="statusText" class="text-[10px] mt-4 font-black text-[#32cd32] uppercase tracking-[0.3em] animate-pulse">STANDBY</div>
            </div>
        </div>

        <div id="log" class="bg-black border-2 border-[#00ff00] h-32 overflow-y-auto p-4 text-xs text-[#00ff00] font-mono mb-8 opacity-90 leading-relaxed">
            <div>> SYSTEM ONLINE</div>
        </div>

        <div class="flex flex-col sm:flex-row gap-6 relative z-20">
            <button id="downloadBtn" onclick="downloadCSV()" disabled class="flex-1 border-4 border-[#00ff00] bg-[#00ff00]/5 text-[#00ff00] font-black py-4 hover:bg-[#00ff00] hover:text-black transition-all uppercase tracking-widest disabled:opacity-20">
                EXPORT_CSV
            </button>
            <button id="copyBtn" onclick="copyToClipboard()" disabled class="flex-1 border-4 border-[#00ff00]/30 text-[#00ff00] font-black py-4 hover:border-[#00ff00] transition-all uppercase tracking-widest disabled:opacity-20">
                COPY_BUFFER
            </button>
        </div>
    </div>

    <script>
        let allHolders = [];
        let currentTokenPriceInXRP = 0;
        let globalXRPPriceUSD = 0;
        let currentTotalSupply = 0;

        function logger(msg, success=false) {
            const log = document.getElementById('log');
            const div = document.createElement('div');
            div.innerHTML = `<span class="${success ? 'text-[#32cd32] font-black' : ''}">> ${msg}</span>`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function fetchXRPPrice() {
            try {
                const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=usd");
                const data = await res.json();
                globalXRPPriceUSD = data.ripple.usd;
                document.getElementById('xrpPriceDisplay').innerText = `XRP: $${globalXRPPriceUSD.toFixed(3)}`;
            } catch(e) { logger("PRICE FEED ERROR"); }
        }
        fetchXRPPrice();

        function hexToAscii(hex) {
            if (!hex || hex.length < 3) return hex;
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                let code = parseInt(hex.substr(i, 2), 16);
                if (code !== 0) str += String.fromCharCode(code);
            }
            return str.replace(/[^\x20-\x7E]/g, '') || hex;
        }

        async function fetchTokenIcon(issuer, currency) {
            const iconImg = document.getElementById('tokenIcon');
            const placeholder = document.getElementById('iconPlaceholder');
            const readable = hexToAscii(currency).substring(0, 1).toUpperCase();
            placeholder.innerText = readable || "?";
            placeholder.style.display = 'block';
            iconImg.style.display = 'none';

            const url = `https://api.xrp.cafe/v1/token/icon/${issuer}/${currency}`;
            const tester = new Image();
            tester.onload = () => {
                iconImg.src = url;
                iconImg.style.display = 'block';
                placeholder.style.display = 'none';
            };
            tester.src = url;
        }

        document.getElementById('currencySelect').addEventListener('change', async function() {
            if(!this.value) return;
            const selected = this.options[this.selectedIndex];
            currentTotalSupply = parseFloat(selected.getAttribute('data-supply')) || 0;
            const issuer = document.getElementById('issuer').value.trim();
            fetchTokenIcon(issuer, this.value);
            document.getElementById('tokenPriceDisplay').innerText = "LOCKING...";
            currentTokenPriceInXRP = await getDEXPrice(issuer, this.value);
            document.getElementById('tokenPriceDisplay').innerText = `${currentTokenPriceInXRP.toFixed(6)} XRP`;
            document.getElementById('startBtn').disabled = false;
            logger(`ASSET LOCKED: ${hexToAscii(this.value)}`, true);
        });

        async function getDEXPrice(issuer, currency) {
            try {
                const response = await fetch("https://xrplcluster.com", {
                    method: 'POST',
                    body: JSON.stringify({
                        method: "book_offers",
                        params: [{ taker_gets: { currency: "XRP" }, taker_pays: { currency: currency, issuer: issuer }, limit: 1 }]
                    })
                });
                const data = await response.json();
                const offers = data.result.offers;
                if(!offers || offers.length === 0) return 0;
                return (parseFloat(offers[0].TakerGets) / 1000000) / parseFloat(offers[0].TakerPays.value);
            } catch(e) { return 0; }
        }

        async function loadIssuerCurrencies() {
            const issuer = document.getElementById('issuer').value.trim();
            if (!issuer) return logger("ADDRESS REQUIRED");
            logger(`SCANNING GATEWAY: ${issuer}`);
            try {
                const response = await fetch("https://xrplcluster.com", {
                    method: 'POST',
                    body: JSON.stringify({ method: "gateway_balances", params: [{ account: issuer, ledger_index: "validated" }] })
                });
                const data = await response.json();
                const obligations = data.result.obligations || {};
                const selectEl = document.getElementById('currencySelect');
                selectEl.innerHTML = '<option value="">-- SELECT TARGET --</option>';
                Object.keys(obligations).forEach(curr => {
                    const opt = document.createElement('option');
                    opt.value = curr;
                    opt.setAttribute('data-supply', obligations[curr]);
                    opt.text = `${hexToAscii(curr)} (${Math.floor(obligations[curr]).toLocaleString()})`;
                    selectEl.appendChild(opt);
                });
                document.getElementById('filterBlock').classList.remove('hidden');
                logger("GATEWAY SYNCED", true);
            } catch (e) { logger("SYNC FAILED"); }
        }

        async function startExtraction() {
            const issuer = document.getElementById('issuer').value.trim();
            const currency = document.getElementById('currencySelect').value;
            const minBal = parseFloat(document.getElementById('minBalance').value) || 0;
            const minPerc = parseFloat(document.getElementById('minPercent').value) || 0;
            const minXRP = parseFloat(document.getElementById('minXRP').value) || 0;
            allHolders = [];
            document.getElementById('startBtn').disabled = true;
            document.getElementById('statusText').innerText = "SCANNING...";
            logger("EXECUTING DEEP SCAN...");
            try {
                let marker = undefined;
                let hasMore = true;
                while (hasMore) {
                    const response = await fetch("https://xrplcluster.com", {
                        method: 'POST',
                        body: JSON.stringify({ method: "account_lines", params: [{ account: issuer, ledger_index: "validated", limit: 400, marker }] })
                    });
                    const data = await response.json();
                    const result = data.result;
                    result.lines.filter(l => l.currency === currency).forEach(l => {
                        const balance = Math.abs(parseFloat(l.balance));
                        const xrpValue = balance * currentTokenPriceInXRP;
                        const percentage = currentTotalSupply > 0 ? (balance / currentTotalSupply) * 100 : 0;
                        if (balance >= minBal && percentage >= minPerc && xrpValue >= minXRP) {
                            allHolders.push({ address: l.account, balance, xrpValue, percentage });
                        }
                    });
                    document.getElementById('progressCount').innerText = allHolders.length;
                    marker = result.marker;
                    hasMore = !!marker;
                }
                document.getElementById('statusText').innerText = "COMPLETE";
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('copyBtn').disabled = false;
                logger(`SCAN SUCCESS: ${allHolders.length} RECORDS`, true);
            } catch (e) { logger("SCAN INTERRUPTED"); }
            document.getElementById('startBtn').disabled = false;
        }

        function downloadCSV() {
            allHolders.sort((a, b) => b.balance - a.balance);
            let csv = "Address,Balance,XRP_Value,Percent\n";
            allHolders.forEach(h => csv += `${h.address},${h.balance},${h.xrpValue.toFixed(2)},${h.percentage.toFixed(4)}%\n`);
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `XRPMAN_INTEL_${Date.now()}.csv`;
            
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
            
            logger("INTEL EXPORTED TO DISK");
        }

        function copyToClipboard() {
            const csv = allHolders.map(h => `${h.address},${h.balance}`).join("\n");
            const el = document.createElement('textarea');
            el.value = csv;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            logger("COPIED TO CLIPBOARD");
        }
    </script>
</body>
</html>
