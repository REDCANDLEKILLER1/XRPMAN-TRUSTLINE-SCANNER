<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRPMan TRUSTLINE Scraper</title>
    <script src="https://unpkg.com/xrpl@2.3.0/build/xrpl-latest-min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #00ff00; font-family: 'Courier New', Courier, monospace; }
        .hud-border { border: 1px solid #00ff00; }
        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 0, 0.15);
            position: absolute; animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #00ff00; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        input, select { background-color: #000 !important; color: #00ff00 !important; border-color: #00ff00 !important; }
        input::placeholder { color: rgba(0, 255, 0, 0.5); }
        button#startBtn { background-color: #00ff00 !important; color: #000 !important; }
        button#startBtn:hover { background-color: #33ff33 !important; box-shadow: 0 0 15px #00ff00; }
        .text-glow { text-shadow: 0 0 8px rgba(0, 255, 0, 0.6); }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-5xl relative overflow-hidden hud-border bg-black p-6 rounded-lg shadow-[0_0_30px_rgba(0,255,0,0.2)]">
        <div class="scanline"></div>
        
        <header class="border-b border-[#00ff00] pb-4 mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl md:text-4xl font-black tracking-tighter text-[#00ff00] uppercase text-glow">XRPMan Value Scraper</h1>
                <p class="text-[10px] text-[#00ff00] mt-1 opacity-70 uppercase">DEX Price Engine Enabled | Color: #00ff00</p>
            </div>
            <div class="text-right">
                <div id="xrpPriceDisplay" class="text-xs font-bold">XRP: $0.00</div>
                <button onclick="location.reload()" class="text-[10px] border border-red-600 text-red-600 px-2 py-1 hover:bg-red-600 hover:text-black transition-all uppercase font-bold">Reset</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="md:col-span-2 space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Issuer Address</label>
                    <div class="flex gap-2">
                        <input id="issuer" type="text" placeholder="r-Address..." class="flex-1 border p-2 text-sm outline-none font-bold">
                        <button id="loadIssuerBtn" onclick="loadIssuerCurrencies()" class="border border-[#00ff00] text-[#00ff00] px-4 font-bold hover:bg-[#00ff00] hover:text-black transition-colors text-xs uppercase">Load</button>
                    </div>
                </div>

                <div id="filterBlock" class="hidden fade-in border border-[#00ff00] p-4 bg-zinc-900/20 space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Select Token</label>
                            <select id="currencySelect" class="w-full border p-2 outline-none font-bold text-sm"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Current Token Price</label>
                            <div id="tokenPriceDisplay" class="p-2 border border-[#00ff00]/30 text-sm font-mono italic">Awaiting selection...</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Min Balance</label>
                            <input id="minBalance" type="number" placeholder="0" class="w-full border p-2 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Min % Supply</label>
                            <input id="minPercent" type="number" step="0.01" placeholder="0" class="w-full border p-2 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-[#00ff00] mb-1">Min XRP Value</label>
                            <input id="minXRP" type="number" placeholder="0" class="w-full border p-2 text-xs outline-none">
                        </div>
                    </div>
                </div>

                <button id="startBtn" onclick="startExtraction()" disabled class="w-full font-black py-4 transition-all uppercase tracking-widest disabled:opacity-30">
                    Scan Wallet Values
                </button>
            </div>

            <div class="border border-[#00ff00] p-4 flex flex-col justify-center items-center text-center relative overflow-hidden bg-[#00ff00]/5">
                <div id="statusIndicator" class="w-2 h-2 rounded-full bg-zinc-800 absolute top-2 right-2"></div>
                <div id="statusText" class="text-xs mb-2 font-bold text-[#00ff00] uppercase">Awaiting Target...</div>
                <div id="progressCount" class="text-6xl font-black text-[#00ff00] text-glow my-2">0</div>
                <div class="text-[10px] text-[#00ff00] uppercase tracking-widest border-t border-[#00ff00] pt-2 w-3/4 mx-auto opacity-70">Filtered Wallets</div>
            </div>
        </div>

        <div id="log" class="bg-black border border-[#00ff00] h-32 overflow-y-auto p-3 text-[10px] text-[#00ff00] mb-6 font-mono opacity-80 italic">
            [SYS] Value Engine Initialized.
        </div>

        <div class="flex gap-4">
            <button id="downloadBtn" onclick="downloadCSV()" disabled class="flex-1 border-2 border-[#00ff00] text-[#00ff00] font-black py-3 hover:bg-[#00ff00] hover:text-black transition-all uppercase disabled:opacity-30">Download Data</button>
            <button id="copyBtn" onclick="copyToClipboard()" disabled class="flex-1 border-2 border-[#00ff00]/30 text-[#00ff00]/50 font-black py-3 hover:border-[#00ff00] hover:text-[#00ff00] transition-all uppercase disabled:opacity-30">Copy CSV</button>
        </div>
    </div>

    <script>
        let allHolders = [];
        let currentTokenPriceInXRP = 0;
        let globalXRPPriceUSD = 0;
        let currentTotalSupply = 0;
        const logEl = document.getElementById('log');

        async function fetchXRPPrice() {
            try {
                const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=usd");
                const data = await res.json();
                globalXRPPriceUSD = data.ripple.usd;
                document.getElementById('xrpPriceDisplay').innerText = `XRP: $${globalXRPPriceUSD.toFixed(3)}`;
            } catch(e) { logger("Price API Error", "error"); }
        }
        fetchXRPPrice();

        document.getElementById('currencySelect').addEventListener('change', async function() {
            if(!this.value) return;
            const selected = this.options[this.selectedIndex];
            currentTotalSupply = parseFloat(selected.getAttribute('data-supply')) || 0;
            const issuer = document.getElementById('issuer').value.trim();
            
            document.getElementById('tokenPriceDisplay').innerText = "Querying DEX...";
            currentTokenPriceInXRP = await getDEXPrice(issuer, this.value);
            
            const usdVal = (currentTokenPriceInXRP * globalXRPPriceUSD).toFixed(6);
            document.getElementById('tokenPriceDisplay').innerHTML = `${currentTokenPriceInXRP.toFixed(6)} XRP <span class="opacity-50 text-[10px]">($${usdVal})</span>`;
            document.getElementById('startBtn').disabled = false;
            logger(`Price Engine synced: 1 Token = ${currentTokenPriceInXRP.toFixed(6)} XRP`);
        });

        async function getDEXPrice(issuer, currency) {
            try {
                const response = await fetch("https://xrplcluster.com", {
                    method: 'POST',
                    body: JSON.stringify({
                        method: "book_offers",
                        params: [{
                            taker_gets: { currency: "XRP" },
                            taker_pays: { currency: currency, issuer: issuer },
                            limit: 3
                        }]
                    })
                });
                const data = await response.json();
                const offers = data.result.offers;
                if(!offers || offers.length === 0) return 0;
                
                // Price = TakerPays (Token) / TakerGets (XRP) ?? 
                // We want: 1 Token = X XRP.
                // An offer to SELL tokens for XRP: taker_gets is Token, taker_pays is XRP.
                const offer = offers[0];
                const xrpAmount = parseFloat(offer.TakerGets) / 1000000; // drops to XRP
                const tokenAmount = parseFloat(offer.TakerPays.value);
                return xrpAmount / tokenAmount;
            } catch(e) { return 0; }
        }

        function logger(msg, type = 'info') {
            const div = document.createElement('div');
            const color = type === 'error' ? 'text-red-500' : 'text-[#00ff00]';
            div.innerHTML = `<span class="opacity-50">[${new Date().toLocaleTimeString()}]</span> <span class="${color}">${msg}</span>`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function loadIssuerCurrencies() {
            const issuer = document.getElementById('issuer').value.trim();
            if (!issuer) return;
            logger(`Scanning Gateway: ${issuer}...`);
            try {
                const response = await fetch("https://xrplcluster.com", {
                    method: 'POST',
                    body: JSON.stringify({ method: "gateway_balances", params: [{ account: issuer, ledger_index: "validated" }] })
                });
                const data = await response.json();
                const obligations = data.result.obligations || {};
                const selectEl = document.getElementById('currencySelect');
                selectEl.innerHTML = '<option value="">-- Select Token --</option>';
                Object.keys(obligations).forEach(curr => {
                    const opt = document.createElement('option');
                    opt.value = curr;
                    opt.setAttribute('data-supply', obligations[curr]);
                    opt.text = `${curr.length > 3 ? 'HEX' : curr} (${parseFloat(obligations[curr]).toLocaleString()})`;
                    selectEl.appendChild(opt);
                });
                document.getElementById('filterBlock').classList.remove('hidden');
            } catch (e) { logger("Issuer scanning failed", "error"); }
        }

        async function startExtraction() {
            const issuer = document.getElementById('issuer').value.trim();
            const currency = document.getElementById('currencySelect').value;
            const minBal = parseFloat(document.getElementById('minBalance').value) || 0;
            const minPerc = parseFloat(document.getElementById('minPercent').value) || 0;
            const minXRP = parseFloat(document.getElementById('minXRP').value) || 0;
            
            allHolders = [];
            document.getElementById('startBtn').disabled = true;
            document.getElementById('statusText').innerText = "Extracting...";
            document.getElementById('statusIndicator').style.backgroundColor = "#00ff00";

            try {
                let marker = undefined;
                let hasMore = true;
                while (hasMore) {
                    const response = await fetch("https://xrplcluster.com", {
                        method: 'POST',
                        body: JSON.stringify({ method: "account_lines", params: [{ account: issuer, ledger_index: "validated", limit: 400, marker }] })
                    });
                    const data = await response.json();
                    const result = data.result;
                    
                    result.lines.filter(l => l.currency === currency).forEach(l => {
                        const balance = Math.abs(parseFloat(l.balance));
                        const xrpValue = balance * currentTokenPriceInXRP;
                        const usdValue = xrpValue * globalXRPPriceUSD;
                        const percentage = currentTotalSupply > 0 ? (balance / currentTotalSupply) * 100 : 0;
                        
                        if (balance >= minBal && percentage >= minPerc && xrpValue >= minXRP) {
                            allHolders.push({ address: l.account, balance, xrpValue, usdValue, percentage });
                        }
                    });
                    
                    document.getElementById('progressCount').innerText = allHolders.length;
                    marker = result.marker;
                    hasMore = !!marker;
                }
                document.getElementById('statusText').innerText = "Analysis Complete";
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('copyBtn').disabled = false;
                logger(`Found ${allHolders.length} wallets meeting value criteria.`);
            } catch (e) { logger("Extraction Failed", "error"); }
            document.getElementById('startBtn').disabled = false;
        }

        function generateCSV() {
            allHolders.sort((a, b) => b.xrpValue - a.xrpValue);
            let csv = "Address,Token_Balance,XRP_Value,USD_Value,Percent_Supply\n";
            allHolders.forEach(h => {
                csv += `${h.address},${h.balance},${h.xrpValue.toFixed(2)},${h.usdValue.toFixed(2)},${h.percentage.toFixed(4)}%\n`;
            });
            return csv;
        }

        function downloadCSV() {
            const blob = new Blob([generateCSV()], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `XRPMan_Value_Extract.csv`;
            a.click();
            logger("CSV Exported.");
        }

        function copyToClipboard() {
            const el = document.createElement('textarea');
            el.value = generateCSV();
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            logger("Data copied.");
        }
    </script>
</body>
</html>
